<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>整理小动物</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#6b8f4a;touch-action:none;-webkit-user-select:none;user-select:none;font-family:Arial,sans-serif}
.card{position:absolute;width:120px;height:120px;cursor:grab;transition:box-shadow 0.2s;border-radius:10px}
.card img{width:100%;height:100%;border-radius:10px;pointer-events:none;-webkit-user-drag:none;user-select:none}
.card.locked{cursor:default;box-shadow:0 0 0 3px rgba(76,175,80,0.6)}
#start-screen{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:10}
#start-btn{padding:15px 40px;font-size:24px;border:none;border-radius:30px;background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
#game-area{display:none;position:relative;width:100vw;height:100vh}
#replay-btn{position:fixed;top:10px;right:10px;font-size:20px;background:rgba(0,0,0,0.4);color:#fff;border:none;border-radius:50%;width:44px;height:44px;cursor:pointer;z-index:5;display:none}
#win-screen{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:40px 60px;border-radius:20px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.4);z-index:10;display:none;flex-direction:column;align-items:center}
#win-screen h1{font-size:28px;color:#4CAF50;margin:0 0 10px 0}
#win-screen p{color:#666;margin:0 0 20px 0;font-size:18px}
#win-btn{padding:12px 30px;font-size:20px;border:none;border-radius:8px;background:#4caf50;color:#fff;cursor:pointer}
#erase-canvas{position:absolute;top:0;left:0;z-index:3;cursor:crosshair;border-radius:10px;pointer-events:none}
#erase-canvas.active{pointer-events:auto}
#erase-overlay{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);padding:10px 20px;border-radius:20px;display:none;justify-content:center;align-items:center;z-index:8}
#erase-overlay p{color:#fff;margin:0;font-size:14px;white-space:nowrap}
#erase-close{margin-top:15px;padding:10px 25px;border:none;border-radius:20px;background:#f44336;color:#fff;font-size:18px;cursor:pointer}
</style>
</head>
<body>

<div id="start-screen">
  <h1 style="color:#fff;margin-bottom:20px">🐱 整理小动物 🐶</h1>
  <button id="start-btn">开始游戏</button>
</div>

<div id="game-area">
  <div class="card" id="card1" style="display:none"><img alt=""></div>
  <div class="card" id="card2" style="display:none"><img alt=""></div>
  <div class="card" id="card3" style="display:none"><img alt=""></div>
  <div class="card" id="card4" style="display:none"><img alt=""></div>
  <canvas id="erase-canvas" style="display:none"></canvas>
</div>

<div id="target-display" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:20px;padding:30px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.4);z-index:8;flex-direction:column;align-items:center">
  <p style="font-size:18px;color:#666;margin-bottom:15px">记住它！擦除找到它</p>
  <img id="target-img" style="width:150px;height:150px;border-radius:10px" alt="">
</div>

<button id="replay-btn">🔄</button>

<div id="win-screen">
  <h1>整理成功！</h1>
  <p id="win-text"></p>
  <button id="win-btn">下一关</button>
</div>

<div id="erase-overlay">
  <p>✏️ 擦除找到记住的小动物</p>
</div>

<script>
var audioCtx=null,soundOn=true;
function initAudio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}}
function playClick(){if(!soundOn||!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=600+Math.random()*300;g.gain.setValueAtTime(0.06,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.04);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.04)}
function playLock(){if(!soundOn||!audioCtx)return;var t=audioCtx.currentTime;[523,659,784].forEach(function(f,i){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*0.1);g.gain.linearRampToValueAtTime(0.1,t+i*0.1+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.25);o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.1);o.stop(t+i*0.1+0.25)})}
function playWin(){if(!soundOn||!audioCtx)return;var t=audioCtx.currentTime;[523,659,784,1047].forEach(function(f,i){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*0.12);g.gain.linearRampToValueAtTime(0.12,t+i*0.12+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.4);o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.4)})}
function playErase(){if(!soundOn||!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=200+Math.random()*100;g.gain.setValueAtTime(0.02,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.03);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.03)}

var cardData=[
  {el:null,targetX:0,targetY:0,locked:false,rotation:0,scale:1,targetRot:0},
  {el:null,targetX:0,targetY:0,locked:false,rotation:0,scale:1,targetRot:0},
  {el:null,targetX:0,targetY:0,locked:false,rotation:0,scale:1,targetRot:0},
  {el:null,targetX:0,targetY:0,locked:false,rotation:0,scale:1,targetRot:0}
];
var dragIdx=-1,dragOx=0,dragOy=0;
var rotIdx=-1,rotStartAngle=0,rotStartRot=0;
var phase='start';
var currentLevel=1;
var levelConfigs={};

var startScreen=document.getElementById('start-screen');
var gameArea=document.getElementById('game-area');
var winScreen=document.getElementById('win-screen');
var replayBtn=document.getElementById('replay-btn');
var eraseCanvas=document.getElementById('erase-canvas');
var eraseCtx=eraseCanvas.getContext('2d');
var eraseOverlay=document.getElementById('erase-overlay');

document.getElementById('start-btn').addEventListener('click',function(){
  initAudio();
  startScreen.style.display='none';
  gameArea.style.display='block';
  currentLevel=1;
  requestAnimationFrame(function(){requestAnimationFrame(setupLevel)});
});
document.getElementById('win-btn').addEventListener('click',function(){winScreen.style.display='none';currentLevel=1;requestAnimationFrame(function(){requestAnimationFrame(setupLevel)})});
replayBtn.addEventListener('click',function(){requestAnimationFrame(function(){requestAnimationFrame(setupLevel)})});
var eraseClose=document.getElementById('erase-close');if(eraseClose)eraseClose.addEventListener('click',function(){eraseOverlay.style.display='none'});

var animals=[
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect fill="#fff" width="120" height="120" rx="10"/><ellipse cx="60" cy="65" rx="35" ry="30" fill="#f5a623"/><circle cx="60" cy="55" r="25" fill="#f5a623"/><polygon points="35,35 28,10 48,30" fill="#f5a623"/><polygon points="85,35 92,10 72,30" fill="#f5a623"/><circle cx="48" cy="50" r="4" fill="#333"/><circle cx="72" cy="50" r="4" fill="#333"/><ellipse cx="60" cy="60" rx="5" ry="3" fill="#333"/><path d="M55 65 Q60 72 65 65" stroke="#333" fill="none" stroke-width="2"/></svg>',
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect fill="#fff" width="120" height="120" rx="10"/><ellipse cx="60" cy="65" rx="30" ry="28" fill="#4ecdc4"/><circle cx="60" cy="55" r="22" fill="#4ecdc4"/><circle cx="42" cy="35" r="10" fill="#4ecdc4"/><circle cx="78" cy="35" r="10" fill="#4ecdc4"/><circle cx="50" cy="50" r="3" fill="#333"/><circle cx="70" cy="50" r="3" fill="#333"/><ellipse cx="60" cy="58" rx="4" ry="3" fill="#333"/><path d="M54 64 Q60 70 66 64" stroke="#333" fill="none" stroke-width="2"/></svg>',
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect fill="#fff" width="120" height="120" rx="10"/><ellipse cx="60" cy="65" rx="32" ry="26" fill="#a855f7"/><circle cx="60" cy="50" r="22" fill="#a855f7"/><ellipse cx="38" cy="32" rx="8" ry="12" fill="#a855f7"/><ellipse cx="82" cy="32" rx="8" ry="12" fill="#a855f7"/><circle cx="50" cy="46" r="3.5" fill="#fff"/><circle cx="50" cy="46" r="2" fill="#333"/><circle cx="70" cy="46" r="3.5" fill="#fff"/><circle cx="70" cy="46" r="2" fill="#333"/><ellipse cx="60" cy="55" rx="3" ry="2" fill="#ff8fab"/><path d="M54 60 Q60 66 66 60" stroke="#333" fill="none" stroke-width="2"/></svg>'
];

function generateLevelConfig(level){
  var w=window.innerWidth,h=window.innerHeight,baseSize=120;
  var cfg={numCards:level<=2?1:3,positions:[],scales:[],scatter:[],scatterRot:[],memoryTime:1500};

  if(level===1){
    cfg.numCards=1;
    cfg.positions.push({x:(w-baseSize)/2,y:(h-baseSize)/2});
    cfg.scales.push(1);
    cfg.scatter.push({x:(w-baseSize)/2,y:(h-baseSize)/2});
    cfg.scatterRot.push(20+Math.floor(Math.random()*46));
  }else if(level===2){
    cfg.numCards=3;
    var positions=[
      {x:Math.max(20,(w-baseSize)/3),y:Math.max(60,(h-baseSize)/3)},
      {x:Math.min(w-baseSize-20,w-(w-baseSize)*2/3),y:Math.max(60,(h-baseSize)*2/3)},
      {x:(w-baseSize)/2,y:Math.min(h-baseSize-60,h-(h-baseSize)/4-baseSize)}
    ];
    for(var i=0;i<3;i++){
      cfg.positions.push(positions[i]);
      cfg.scales.push(0.75+Math.random()*0.25);
      var cs=baseSize*cfg.scales[i];
      cfg.scatter.push({x:Math.random()*(w-cs-40)+20,y:Math.random()*(h-cs-40)+20});
      cfg.scatterRot.push(Math.floor(Math.random()*360)-180);
    }
    cfg.memoryTime=3000;
  }else if(level===3){
    // 记忆配对+擦除 - 4张卡片
    cfg.numCards=4;
    var targetAnimal=Math.floor(Math.random()*3);
    cfg.targetAnimal=targetAnimal;
    var others=[];
    for(var i=0;i<3;i++){if(i!==targetAnimal)others.push(i)}
    var cardAnimals=[targetAnimal];
    while(cardAnimals.length<4){
      var r=others[Math.floor(Math.random()*others.length)];
      cardAnimals.push(r);
    }
    cfg.cardAnimals=cardAnimals;
    // 2x2 grid
    var gx=(w-baseSize*2-60)/2,gy=(h-baseSize*2-60)/2;
    cfg.positions.push({x:gx,y:gy});
    cfg.positions.push({x:gx+baseSize+20,y:gy});
    cfg.positions.push({x:gx,y:gy+baseSize+20});
    cfg.positions.push({x:gx+baseSize+20,y:gy+baseSize+20});
    for(var i=0;i<4;i++){
      cfg.scales.push(1);
      cfg.scatter.push({x:cfg.positions[i].x,y:cfg.positions[i].y});
      cfg.scatterRot.push(0);
    }
    cfg.memoryTime=2000;
  }
  return cfg;
}

function setupLevel(){
  eraseCanvas.style.display='none';
  eraseCanvas.classList.remove('active');
  eraseOverlay.style.display='none';
  document.getElementById('target-display').style.display='none';

  var cfg=generateLevelConfig(currentLevel);
  levelConfigs[currentLevel]=cfg;
  var baseSize=120;
  var numCards=cfg.numCards;

  for(var i=0;i<4;i++){
    var c=cardData[i];
    c.el=document.getElementById('card'+(i+1));
    if(i>=numCards){c.el.style.display='none';continue}
    var animalIdx=(i%3);
    if(currentLevel===3&&cfg.cardAnimals){
      animalIdx=cfg.cardAnimals[i];
    }
    c.el.querySelector('img').src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(animals[animalIdx])));
    c.scale=cfg.scales[i];
    c.el.style.width=Math.round(baseSize*c.scale)+'px';
    c.targetX=cfg.positions[i].x;
    c.targetY=cfg.positions[i].y;
    c.targetRot=0;
    c.locked=false;
    c.rotation=0;
    c.el.style.transition='none';
    c.el.style.left=c.targetX+'px';
    c.el.style.top=c.targetY+'px';
    c.el.style.transform='rotate(0deg) scale('+c.scale+')';
    c.el.classList.remove('locked');
    c.el.style.display='block';
  }

  replayBtn.style.display='block';

  if(currentLevel===1){
    var c=cardData[0];
    c.rotation=20+Math.floor(Math.random()*46);
    c.el.style.transition='none';
    c.el.style.transform='rotate('+c.rotation+'deg) scale('+c.scale+')';
    phase='play';
  }else if(currentLevel===2){
    phase='memory';
    setTimeout(function(){
      phase='scatter';
      for(var i=0;i<numCards;i++){
        var c=cardData[i];
        var s=cfg.scatter[i];
        c.rotation=cfg.scatterRot[i];
        c.el.style.left=s.x+'px';
        c.el.style.top=s.y+'px';
        c.el.style.transform='rotate('+c.rotation+'deg) scale('+c.scale+')';
      }
      phase='play';
    },cfg.memoryTime);
  }else if(currentLevel===3){
    // Show target animal
    var targetIdx=cfg.targetAnimal;
    document.getElementById('target-img').src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(animals[targetIdx])));
    document.getElementById('target-display').style.display='flex';
    setTimeout(function(){
      document.getElementById('target-display').style.display='none';
      // Cover all cards with erase canvas
      initEraseAll();
    },cfg.memoryTime);
  }
}

/* ===== Level 3: Erase all cards to find target ===== */
var eraseCanvases=[];
var eraseCardState=[]; // {erasing:false, erased:false}
var targetAnimalIdx=0;

function initEraseAll(){
  var cfg=levelConfigs[currentLevel];
  targetAnimalIdx=cfg.targetAnimal;
  eraseCanvases=[];
  eraseCardState=[];

  for(var i=0;i<4;i++){
    var c=cardData[i];
    var canvas=document.createElement('canvas');
    canvas.width=c.el.offsetWidth;
    canvas.height=c.el.offsetHeight;
    canvas.style.width=c.el.offsetWidth+'px';
    canvas.style.height=c.el.offsetHeight+'px';
    canvas.style.position='absolute';
    canvas.style.left=c.el.style.left;
    canvas.style.top=c.el.style.top;
    canvas.style.zIndex='10';
    canvas.style.cursor='crosshair';
    canvas.style.borderRadius='10px';
    canvas.style.display='block';
    canvas.style.pointerEvents='auto';
    // 卡片不拦截事件
    c.el.style.pointerEvents='none';
    gameArea.appendChild(canvas);
    eraseCanvases.push(canvas);
    eraseCardState.push({erasing:false,erased:false,done:false});

    // Draw scribbles
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='rgba(120,120,120,0.95)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='rgba(90,90,90,0.8)';
    ctx.lineWidth=2;
    for(var j=0;j<150;j++){
      ctx.beginPath();
      ctx.moveTo(Math.random()*canvas.width,Math.random()*canvas.height);
      ctx.lineTo(Math.random()*canvas.width,Math.random()*canvas.height);
      ctx.stroke();
    }

    (function(idx,ctx){
      function startErase(x,y){eraseCardState[idx].erasing=true;eraseFn(x,y)}
      function moveErase(x,y){if(eraseCardState[idx].erasing)eraseFn(x,y)}
      function endErase(){eraseCardState[idx].erasing=false}
      function eraseFn(x,y){
        if(eraseCardState[idx].done)return;
        ctx.globalCompositeOperation='destination-out';
        ctx.beginPath();
        ctx.arc(x,y,20,0,Math.PI*2);
        ctx.fill();
        ctx.globalCompositeOperation='source-over';
        playErase();

        var imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        var transparent=0;
        var total=imageData.width*imageData.height;
        for(var p=3;p<imageData.data.length;p+=4){
          if(imageData.data[p]<128)transparent++;
        }
        var pct=Math.round(transparent/total*100);

        if(pct>=65){
          eraseCardState[idx].done=true;
          canvas.style.display='none';

          if(idx<3&&cfg.cardAnimals[idx]===targetAnimalIdx){
            // Correct!
            playClick();playLock();playWin();
            showLevelComplete();
          }else if(idx<3){
            // Wrong card
            playClick();
            // Mark card as wrong (shake)
            var cardEl=cardData[idx].el;
            cardEl.style.transition='all 0.2s';
            cardEl.style.opacity='0.3';
          }
        }
      }
      canvas.onmousedown=function(e){e.stopPropagation();e.preventDefault();var r=canvas.getBoundingClientRect();startErase(e.clientX-r.left,e.clientY-r.top)};
      canvas.onmousemove=function(e){e.stopPropagation();e.preventDefault();var r=canvas.getBoundingClientRect();moveErase(e.clientX-r.left,e.clientY-r.top)};
      canvas.onmouseup=endErase;
      canvas.onmouseleave=endErase;
      canvas.ontouchstart=function(e){e.stopPropagation();e.preventDefault();var r=canvas.getBoundingClientRect();var t=e.touches[0];startErase(t.clientX-r.left,t.clientY-r.top)},{passive:false};
      canvas.ontouchmove=function(e){e.stopPropagation();e.preventDefault();var r=canvas.getBoundingClientRect();var t=e.touches[0];moveErase(t.clientX-r.left,t.clientY-r.top)},{passive:false};
      canvas.ontouchend=endErase;
    })(i,ctx);
  }

  phase='play';
  eraseOverlay.style.display='flex';
}

function showLevelComplete(){
  playWin();
  if(currentLevel<3){
    var txt=['','第 1 关通过！','第 2 关通过！'][currentLevel];
    document.getElementById('win-text').textContent=txt;
    winScreen.style.display='flex';
    document.getElementById('win-btn').textContent='下一关';
    var savedLevel=currentLevel;
    document.getElementById('win-btn').onclick=function(){
      winScreen.style.display='none';
      currentLevel=savedLevel+1;
      document.getElementById('win-btn').onclick=function(){winScreen.style.display='none';currentLevel=1;requestAnimationFrame(function(){requestAnimationFrame(setupLevel)})};
      requestAnimationFrame(function(){requestAnimationFrame(setupLevel)});
    };
  }else{
    document.getElementById('win-text').textContent='全部通关！🎊';
    winScreen.style.display='flex';
    document.getElementById('win-btn').textContent='重新开始';
    document.getElementById('win-btn').onclick=function(){winScreen.style.display='none';currentLevel=1;requestAnimationFrame(function(){requestAnimationFrame(setupLevel)})};
  }
}

/* ===== Position snap (only during drag) ===== */
function trySnap(idx){
  if(currentLevel!==2)return;
  var c=cardData[idx];
  if(c.locked)return;
  var r=c.el.getBoundingClientRect();
  var cx=r.left+r.width/2,cy=r.top+r.height/2;
  var tx=c.targetX+c.el.offsetWidth/2,ty=c.targetY+c.el.offsetHeight/2;
  var dist=Math.sqrt(Math.pow(cx-tx,2)+Math.pow(cy-ty,2));
  if(dist<=30){
    c.el.style.transition='all 0.2s ease';
    c.el.style.left=c.targetX+'px';
    c.el.style.top=c.targetY+'px';
    setTimeout(function(){c.el.style.transition=''},200);
  }
}

/* ===== Level 1-3: Check win ===== */
function normalizeRot(rot){
  rot=rot%360;
  if(rot<0)rot+=360;
  if(rot>180)rot=360-rot;
  return rot;
}

function checkWin(idx){
  if(idx<0||idx>=cardData.length)return;
  var c=cardData[idx];
  if(c.locked||phase!=='play')return;

  // 旋转必须在 ±1° 内
  var rotDiff=normalizeRot(c.rotation-c.targetRot);
  if(rotDiff>1)return;

  // 第二关：旋转正确 + 位置已在吸附范围内
  if(currentLevel===2){
    var r=c.el.getBoundingClientRect();
    var cx=r.left+r.width/2,cy=r.top+r.height/2;
    var tx=c.targetX+c.el.offsetWidth/2,ty=c.targetY+c.el.offsetHeight/2;
    var dist=Math.sqrt(Math.pow(cx-tx,2)+Math.pow(cy-ty,2));
    if(dist>30)return;
  }

  c.locked=true;
  c.el.classList.add('locked');
  c.el.style.transition='all 0.2s ease';
  c.el.style.transform='rotate(0deg) scale('+c.scale+')';
  setTimeout(function(){c.el.style.transition=''},200);

  playClick();
  playLock();

  var allLocked=true;
  for(var i=0;i<cardData.length;i++){
    if(cardData[i].el.style.display!=='none'&&!cardData[i].locked){allLocked=false;break}
  }
  if(allLocked){
    setTimeout(function(){
      showLevelComplete();
    },300);
  }
}

/* ===== Drag & Rotate ===== */
document.addEventListener('touchstart',function(e){
  if(phase!=='play')return;
  initAudio();
  if(currentLevel===3)return; // 第三关走canvas
  if(e.touches.length===2){
    // 双指旋转
    var t1=e.touches[0],t2=e.touches[1];
    for(var i=0;i<cardData.length;i++){
      var c=cardData[i];
      if(c.locked||c.el.style.display==='none')continue;
      var r=c.el.getBoundingClientRect(),m=30;
      if(t1.clientX>=r.left-m&&t1.clientX<=r.right+m&&t1.clientY>=r.top-m&&t1.clientY<=r.bottom+m){
        rotIdx=i;rotStartRot=c.rotation;
        rotStartAngle=Math.atan2(t2.clientY-t1.clientY,t2.clientX-t1.clientX)*180/Math.PI;
        break;
      }
    }
  }else if(e.touches.length===1){
    var t=e.touches[0];
    if(currentLevel===2){
      // 第二关：单指拖拽
      for(var i=0;i<cardData.length;i++){
        var c=cardData[i];
        if(c.locked||c.el.style.display==='none')continue;
        var r=c.el.getBoundingClientRect(),m=30;
        if(t.clientX>=r.left-m&&t.clientX<=r.right+m&&t.clientY>=r.top-m&&t.clientY<=r.bottom+m){
          dragIdx=i;dragOx=t.clientX-parseInt(c.el.style.left);dragOy=t.clientY-parseInt(c.el.style.top);
          break;
        }
      }
    }else{
      // 第一关：单指旋转
      for(var i=0;i<cardData.length;i++){
        var c=cardData[i];
        if(c.locked||c.el.style.display==='none')continue;
        var r=c.el.getBoundingClientRect(),m=30;
        if(t.clientX>=r.left-m&&t.clientX<=r.right+m&&t.clientY>=r.top-m&&t.clientY<=r.bottom+m){
          rotIdx=i;rotStartRot=c.rotation;
          rotStartAngle=Math.atan2(t.clientY,t.clientX)*180/Math.PI;
          break;
        }
      }
    }
  }
},{passive:false});

document.addEventListener('touchmove',function(e){
  if(phase!=='play')return;
  e.preventDefault();
  if(currentLevel===3)return;
  if(rotIdx>=0&&e.touches.length>=1){
    var t=e.touches[0],c=cardData[rotIdx];
    var angle=Math.atan2(t.clientY,t.clientX)*180/Math.PI;
    c.rotation=rotStartRot+(angle-rotStartAngle);
    c.el.style.transform='rotate('+c.rotation+'deg) scale('+c.scale+')';
    checkWin(rotIdx);
  }else if(dragIdx>=0&&e.touches.length===1){
    var t=e.touches[0],c=cardData[dragIdx];
    c.el.style.left=(t.clientX-dragOx)+'px';
    c.el.style.top=(t.clientY-dragOy)+'px';
    trySnap(dragIdx);
    checkWin(dragIdx);
  }
},{passive:false});

document.addEventListener('touchend',function(){dragIdx=-1;rotIdx=-1});

document.addEventListener('mousedown',function(e){
  if(phase!=='play')return;
  initAudio();
  if(currentLevel===3)return;
  if(e.shiftKey){
    // Shift+鼠标=旋转
    for(var i=0;i<cardData.length;i++){
      var c=cardData[i];
      if(c.locked||c.el.style.display==='none')continue;
      var r=c.el.getBoundingClientRect();
      if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
        rotIdx=i;rotStartAngle=Math.atan2(e.clientY,e.clientX)*180/Math.PI;rotStartRot=c.rotation;
        e.preventDefault();break;
      }
    }
  }else{
    // 鼠标拖动=移动
    for(var i=0;i<cardData.length;i++){
      var c=cardData[i];
      if(c.locked||c.el.style.display==='none')continue;
      var r=c.el.getBoundingClientRect();
      if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
        if(currentLevel===2){
          dragIdx=i;dragOx=e.clientX-parseInt(c.el.style.left);dragOy=e.clientY-parseInt(c.el.style.top);
        }else{
          rotIdx=i;rotStartAngle=Math.atan2(e.clientY,e.clientX)*180/Math.PI;rotStartRot=c.rotation;
        }
        e.preventDefault();break;
      }
    }
  }
});

document.addEventListener('mousemove',function(e){
  if(phase!=='play')return;
  if(currentLevel===3)return;
  if(rotIdx>=0){
    var c=cardData[rotIdx];
    var angle=Math.atan2(e.clientY,e.clientX)*180/Math.PI;
    c.rotation=rotStartRot+(angle-rotStartAngle);
    c.el.style.transform='rotate('+c.rotation+'deg) scale('+c.scale+')';
    checkWin(rotIdx);
  }else if(dragIdx>=0){
    var c=cardData[dragIdx];
    c.el.style.left=(e.clientX-dragOx)+'px';
    c.el.style.top=(e.clientY-dragOy)+'px';
    trySnap(dragIdx);
    checkWin(dragIdx);
  }
});

document.addEventListener('mouseup',function(){dragIdx=-1;rotIdx=-1});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>整理小狗</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    overflow: hidden;
    background: #6b8f4a;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}
#card {
    position: absolute;
    width: 50vw;
    max-width: 500px;
    min-width: 200px;
    cursor: move;
}
#card img {
    width: 100%;
    height: auto;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
}
#win {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 40px 60px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    z-index: 100;
}
#win h2 { color: #4CAF50; margin: 0 0 10px 0; font-size: 28px; }
#win p { color: #666; margin: 0 0 20px 0; }
#win button {
    padding: 12px 30px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>
<body>
<div id="card">
    <img src="dog.png" alt="小狗">
</div>
<div id="win">
    <h2>🎉 整理成功！</h2>
    <p>小狗已经摆正啦～</p>
    <button onclick="location.reload()">再玩一次</button>
</div>
<script>
var card = document.getElementById('card');
var win = document.getElementById('win');
var rotation = 0;
// === 状态 ===
var dragging = false, dragOx, dragOy;
var rotating = false, rotStartAngle, rotStartRot;
var touches = {};
function setup() {
    var w = window.innerWidth, h = window.innerHeight;
    var cw = card.offsetWidth || 250, ch = card.offsetHeight || 250;
    var cx = (w - cw) / 2, cy = (h - ch) / 2;
    if (cx < 0) cx = 0;
    if (cy < 0) cy = 0;
    card.style.left = cx + 'px';
    card.style.top = cy + 'px';
    rotation = Math.floor(Math.random() * 60) - 30;
    updateRotation();
}
function updateRotation() {
    card.style.transform = 'rotate(' + rotation + 'deg)';
}
// === 触屏 ===
document.addEventListener('touchstart', function(e) {
    if (win.style.display === 'block') return;
    for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        touches[t.identifier] = { x: t.clientX, y: t.clientY };
    }
    var ids = Object.keys(touches);
    if (ids.length === 1) {
        dragging = true;
        var t = touches[ids[0]];
        dragOx = t.x - card.offsetLeft;
        dragOy = t.y - card.offsetTop;
    }
    if (ids.length === 2) {
        dragging = false;
        rotating = true;
        var t1 = touches[ids[0]], t2 = touches[ids[1]];
        rotStartAngle = Math.atan2(t2.y - t1.y, t2.x - t1.x) * 180 / Math.PI;
        rotStartRot = rotation;
    }
}, { passive: false });
document.addEventListener('touchmove', function(e) {
    if (win.style.display === 'block') return;
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        touches[t.identifier] = { x: t.clientX, y: t.clientY };
    }
    var ids = Object.keys(touches);
    if (ids.length === 2 && rotating) {
        var t1 = touches[ids[0]], t2 = touches[ids[1]];
        var angle = Math.atan2(t2.y - t1.y, t2.x - t1.x) * 180 / Math.PI;
        rotation = rotStartRot + (angle - rotStartAngle);
        updateRotation();
        checkWin();
    } else if (ids.length === 1 && dragging) {
        var t = touches[ids[0]];
        card.style.left = (t.x - dragOx) + 'px';
        card.style.top = (t.y - dragOy) + 'px';
    }
}, { passive: false });
document.addEventListener('touchend', function(e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
        delete touches[e.changedTouches[i].identifier];
    }
    if (Object.keys(touches).length < 2) rotating = false;
    if (Object.keys(touches).length < 1) dragging = false;
});
// === 鼠标 ===
card.addEventListener('mousedown', function(e) {
if (win.style.display === 'block') return;
if (e.shiftKey) {
e.preventDefault();
rotating = true;
var r = card.getBoundingClientRect();
var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
rotStartAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
rotStartRot = rotation;
} else {
e.preventDefault();
dragging = true;
dragOx = e.clientX - card.offsetLeft;
dragOy = e.clientY - card.offsetTop;
}
});

document.addEventListener('mousemove', function(e) {
if (win.style.display === 'block') return;
if (rotating) {
var r = card.getBoundingClientRect();
var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
var angle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
rotation = rotStartRot + (angle - rotStartAngle);
updateRotation();
checkWin();
} else if (dragging) {
card.style.left = (e.clientX - dragOx) + 'px';
card.style.top = (e.clientY - dragOy) + 'px';
}
});

document.addEventListener('mouseup', function() {
dragging = false;
rotating = false;
});

function checkWin() {
var a = Math.abs(rotation % 360);
if (a > 180) a = 360 - a;
if (a < 2) {
card.style.transition = 'transform 0.3s ease';
rotation = 0;
card.style.transform = 'rotate(0deg)';
setTimeout(function() {
win.style.display = 'block';
}, 350);
}
}

setup();
window.addEventListener('resize', function() {
var w = window.innerWidth, h = window.innerHeight;
var cw = card.offsetWidth || 250, ch = card.offsetHeight || 250;
var cx = (w - cw) / 2, cy = (h - ch) / 2;
if (cx < 0) cx = 0;
if (cy < 0) cy = 0;
card.style.left = cx + 'px';
card.style.top = cy + 'px';
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>整理小动物</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#6b8f4a;touch-action:none;-webkit-user-select:none;user-select:none;font-family:Arial,sans-serif}
.card{position:absolute;width:120px;height:120px;cursor:grab;transition:box-shadow 0.2s;border-radius:10px}
.card img{width:100%;height:100%;border-radius:10px;pointer-events:none;-webkit-user-drag:none;user-select:none}
.card.locked{cursor:default;box-shadow:0 0 0 3px rgba(76,175,80,0.6)}
#start-screen{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:10}
#start-btn{padding:15px 40px;font-size:24px;border:none;border-radius:30px;background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
#game-area{display:none;position:relative;width:100vw;height:100vh}
#replay-btn{position:fixed;top:10px;right:10px;font-size:20px;background:rgba(0,0,0,0.4);color:#fff;border:none;border-radius:50%;width:44px;height:44px;cursor:pointer;z-index:5}
#win-screen{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;flex-direction:column;z-index:10}
#win-screen h1{font-size:36px;color:#ffd700;margin-bottom:20px;text-shadow:0 0 10px rgba(255,215,0,0.5)}
#win-btn{padding:12px 30px;font-size:20px;border:none;border-radius:20px;background:#4caf50;color:#fff;cursor:pointer;margin:5px}
</style>
</head>
<body>

<div id="start-screen">
  <h1 style="color:#fff;margin-bottom:20px">🐱 整理小动物 🐶</h1>
  <button id="start-btn">开始游戏</button>
</div>

<div id="game-area">
  <div class="card" id="card1" style="display:none"><img alt=""></div>
  <div class="card" id="card2" style="display:none"><img alt=""></div>
  <div class="card" id="card3" style="display:none"><img alt=""></div>
</div>

<button id="replay-btn" style="display:none">🔄</button>

<div id="win-screen">
  <h1>🎉</h1>
  <p id="win-text" style="color:#fff;margin-bottom:15px;font-size:18px"></p>
  <button id="win-btn">再来一次</button>
</div>

<div id="debug-info" style="position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#0f0;padding:4px 12px;border-radius:10px;font-size:14px;font-family:monospace;z-index:5;display:none"></div>

<script>
var audioCtx=null,soundOn=true;
function initAudio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}}
function playClick(){if(!soundOn||!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=600+Math.random()*300;g.gain.setValueAtTime(0.06,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.04);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.04)}
function playLock(){if(!soundOn||!audioCtx)return;var t=audioCtx.currentTime;[523,659,784].forEach(function(f,i){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*0.1);g.gain.linearRampToValueAtTime(0.1,t+i*0.1+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.25);o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.1);o.stop(t+i*0.1+0.25)})}
function playWin(){if(!soundOn||!audioCtx)return;var t=audioCtx.currentTime;[523,659,784,1047].forEach(function(f,i){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*0.12);g.gain.linearRampToValueAtTime(0.12,t+i*0.12+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.4);o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.4)})}

var cardData=[
  {el:null,targetX:0,targetY:0,locked:false,rotation:0,scale:1,targetRot:0},
  {el:null,targetX:0,targetY:0,locked:false,rotation:0,scale:1,targetRot:0},
  {el:null,targetX:0,targetY:0,locked:false,rotation:0,scale:1,targetRot:0}
];
var dragIdx=-1,dragOx=0,dragOy=0;
var rotIdx=-1,rotStartAngle=0,rotStartRot=0;
var phase='start';
var currentLevel=1;
var levelConfigs={};

var startScreen=document.getElementById('start-screen');
var gameArea=document.getElementById('game-area');
var winScreen=document.getElementById('win-screen');
var replayBtn=document.getElementById('replay-btn');

document.getElementById('start-btn').addEventListener('click',function(){
  initAudio();
  startScreen.style.display='none';
  gameArea.style.display='block';
  currentLevel=1;
  requestAnimationFrame(function(){requestAnimationFrame(setupLevel)});
});
document.getElementById('win-btn').addEventListener('click',function(){winScreen.style.display='none';currentLevel=1;requestAnimationFrame(function(){requestAnimationFrame(setupLevel)})});
replayBtn.addEventListener('click',function(){requestAnimationFrame(function(){requestAnimationFrame(setupLevel)})});

function generateLevelConfig(level){
  var w=window.innerWidth,h=window.innerHeight,baseSize=120;
  var cfg={numCards:level===1?1:3,positions:[],scales:[],scatter:[],scatterRot:[],memoryTime:level===1?1500:1500};

  if(level===1){
    cfg.positions.push({x:(w-baseSize)/2,y:(h-baseSize)/2});
    cfg.scales.push(1);
    cfg.scatter.push({x:(w-baseSize)/2,y:(h-baseSize)/2});
    var rots=[90,180,270];
    var ri=Math.floor(Math.random()*rots.length);
    cfg.scatterRot.push(rots[ri]);
  }else{
    var positions=[
      {x:Math.max(20,(w-baseSize)/3),y:Math.max(60,(h-baseSize)/3)},
      {x:Math.min(w-baseSize-20,w-(w-baseSize)*2/3),y:Math.max(60,(h-baseSize)*2/3)},
      {x:(w-baseSize)/2,y:Math.min(h-baseSize-60,h-(h-baseSize)/4-baseSize)}
    ];
    for(var i=0;i<3;i++){
      cfg.positions.push(positions[i]);
      cfg.scales.push(0.75+Math.random()*0.25);
      var cs=baseSize*cfg.scales[i];
      cfg.scatter.push({x:Math.random()*(w-cs-40)+20,y:Math.random()*(h-cs-40)+20});
      cfg.scatterRot.push(Math.floor(Math.random()*360)-180);
    }
  }
  return cfg;
}

var animals=[
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect fill="#fff" width="120" height="120" rx="10"/><ellipse cx="60" cy="65" rx="35" ry="30" fill="#f5a623"/><circle cx="60" cy="55" r="25" fill="#f5a623"/><polygon points="35,35 28,10 48,30" fill="#f5a623"/><polygon points="85,35 92,10 72,30" fill="#f5a623"/><circle cx="48" cy="50" r="4" fill="#333"/><circle cx="72" cy="50" r="4" fill="#333"/><ellipse cx="60" cy="60" rx="5" ry="3" fill="#333"/><path d="M55 65 Q60 72 65 65" stroke="#333" fill="none" stroke-width="2"/></svg>',
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect fill="#fff" width="120" height="120" rx="10"/><ellipse cx="60" cy="65" rx="30" ry="28" fill="#4ecdc4"/><circle cx="60" cy="55" r="22" fill="#4ecdc4"/><circle cx="42" cy="35" r="10" fill="#4ecdc4"/><circle cx="78" cy="35" r="10" fill="#4ecdc4"/><circle cx="50" cy="50" r="3" fill="#333"/><circle cx="70" cy="50" r="3" fill="#333"/><ellipse cx="60" cy="58" rx="4" ry="3" fill="#333"/><path d="M54 64 Q60 70 66 64" stroke="#333" fill="none" stroke-width="2"/></svg>',
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect fill="#fff" width="120" height="120" rx="10"/><ellipse cx="60" cy="65" rx="32" ry="26" fill="#a855f7"/><circle cx="60" cy="50" r="22" fill="#a855f7"/><ellipse cx="38" cy="32" rx="8" ry="12" fill="#a855f7"/><ellipse cx="82" cy="32" rx="8" ry="12" fill="#a855f7"/><circle cx="50" cy="46" r="3.5" fill="#fff"/><circle cx="50" cy="46" r="2" fill="#333"/><circle cx="70" cy="46" r="3.5" fill="#fff"/><circle cx="70" cy="46" r="2" fill="#333"/><ellipse cx="60" cy="55" rx="3" ry="2" fill="#ff8fab"/><path d="M54 60 Q60 66 66 60" stroke="#333" fill="none" stroke-width="2"/></svg>'
];

function setupLevel(){
  var cfg=generateLevelConfig(currentLevel);
  levelConfigs[currentLevel]=cfg;
  var baseSize=120;
  var numCards=cfg.numCards;

  for(var i=0;i<3;i++){
    var c=cardData[i];
    c.el=document.getElementById('card'+(i+1));
    if(i>=numCards){c.el.style.display='none';continue}
    c.el.querySelector('img').src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(animals[i])));
    c.scale=cfg.scales[i];
    c.el.style.width=Math.round(baseSize*c.scale)+'px';
    c.targetX=cfg.positions[i].x;
    c.targetY=cfg.positions[i].y;
    c.targetRot=0;
    c.locked=false;
    c.rotation=0;
    c.el.style.transition='none';
    c.el.style.left=c.targetX+'px';
    c.el.style.top=c.targetY+'px';
    c.el.style.transform='rotate(0deg) scale('+c.scale+')';
    c.el.classList.remove('locked');
    c.el.style.display='block';
  }

  replayBtn.style.display='block';

  if(currentLevel===1){
    var c=cardData[0];
    c.rotation=20+Math.floor(Math.random()*46);
    c.el.style.transition='none';
    c.el.style.transform='rotate('+c.rotation+'deg) scale('+c.scale+')';
    document.getElementById('debug-info').style.display='block';
    document.getElementById('debug-info').textContent='rot:'+c.rotation+'° target:0°';
    phase='play';
  }else{
    phase='memory';
    setTimeout(function(){
      phase='scatter';
      for(var i=0;i<numCards;i++){
        var c=cardData[i];
        var s=cfg.scatter[i];
        c.rotation=cfg.scatterRot[i];
        c.el.style.left=s.x+'px';
        c.el.style.top=s.y+'px';
        c.el.style.transform='rotate('+c.rotation+'deg) scale('+c.scale+')';
      }
      phase='play';
    },cfg.memoryTime);
  }
}

function normalizeRot(rot){
  rot=rot%360;
  if(rot<0)rot+=360;
  if(rot>180)rot=360-rot;
  return rot;
}

function checkWin(idx){
  if(idx<0||idx>=cardData.length)return;
  var c=cardData[idx];
  if(c.locked||phase!=='play')return;

  var rotDiff=normalizeRot(c.rotation-c.targetRot);
  if(rotDiff>1)return;

  c.locked=true;
  c.el.classList.add('locked');
  c.el.style.transition='all 0.2s ease';
  c.el.style.transform='rotate(0deg) scale('+c.scale+')';
  setTimeout(function(){c.el.style.transition=''},200);

  if(currentLevel>=2){
    var r=c.el.getBoundingClientRect();
    var cx=r.left+r.width/2,cy=r.top+r.height/2;
    var tx=c.targetX+c.el.offsetWidth/2,ty=c.targetY+c.el.offsetHeight/2;
    var dist=Math.sqrt(Math.pow(cx-tx,2)+Math.pow(cy-ty,2));
    if(dist>10){
      c.locked=false;
      c.el.classList.remove('locked');
      return;
    }
    c.el.style.left=c.targetX+'px';
    c.el.style.top=c.targetY+'px';
    c.el.style.transform='rotate(0deg) scale('+c.scale+')';
  }

  playClick();
  playLock();

  var allLocked=true;
  for(var i=0;i<cardData.length;i++){
    if(cardData[i].el.style.display!=='none'&&!cardData[i].locked){allLocked=false;break}
  }
  if(allLocked){
    setTimeout(function(){
      playWin();
      if(currentLevel<2){
        document.getElementById('win-text').textContent='第 '+currentLevel+' 关通关！🎉';
        winScreen.style.display='flex';
        var savedLevel=currentLevel;
        document.getElementById('win-btn').onclick=function(){
          winScreen.style.display='none';
          currentLevel=savedLevel+1;
          document.getElementById('win-btn').onclick=function(){winScreen.style.display='none';currentLevel=1;requestAnimationFrame(function(){requestAnimationFrame(setupLevel)})};
          setupLevel();
        };
      }else{
        document.getElementById('win-text').textContent='全部通关！🎊';
        winScreen.style.display='flex';
      }
    },300);
  }
}

document.addEventListener('touchstart',function(e){
  if(phase!=='play')return;
  initAudio();
  var t=e.touches[0];
  for(var i=0;i<cardData.length;i++){
    var c=cardData[i];
    if(c.locked||c.el.style.display==='none')continue;
    var r=c.el.getBoundingClientRect(),m=30;
    if(t.clientX>=r.left-m&&t.clientX<=r.right+m&&t.clientY>=r.top-m&&t.clientY<=r.bottom+m){
      rotIdx=i;
      rotStartRot=c.rotation;
      rotStartAngle=Math.atan2(t.clientY,t.clientX)*180/Math.PI;
      dragOx=t.clientX-parseInt(c.el.style.left);
      dragOy=t.clientY-parseInt(c.el.style.top);
      break;
    }
  }
},{passive:false});

document.addEventListener('touchmove',function(e){
  if(phase!=='play')return;
  e.preventDefault();
  if(rotIdx>=0&&e.touches.length===1){
    var t=e.touches[0],c=cardData[rotIdx];
    var angle=Math.atan2(t.clientY,t.clientX)*180/Math.PI;
    c.rotation=rotStartRot+(angle-rotStartAngle);
    c.el.style.transform='rotate('+c.rotation+'deg) scale('+c.scale+')';
    checkWin(rotIdx);
  }
},{passive:false});

document.addEventListener('touchend',function(){rotIdx=-1});

document.addEventListener('mousedown',function(e){
  if(phase!=='play')return;
  initAudio();
  if(!e.shiftKey){
    for(var i=0;i<cardData.length;i++){
      var c=cardData[i];
      if(c.locked||c.el.style.display==='none')continue;
      var r=c.el.getBoundingClientRect();
      console.log('check card'+i+' locked='+c.locked+' disp='+c.el.style.display+' pos='+Math.round(r.left)+','+Math.round(r.top)+' mouse='+Math.round(e.clientX)+','+Math.round(e.clientY)+' hit='+(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom));
      if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
        rotIdx=i;rotStartAngle=Math.atan2(e.clientY,e.clientX)*180/Math.PI;rotStartRot=c.rotation;
        console.log('rotIdx set to '+i+' startAngle='+rotStartAngle+' startRot='+c.rotation);
        e.preventDefault();break;
      }
    }
  }else{
    for(var i=0;i<cardData.length;i++){
      var c=cardData[i];
      if(c.locked||c.el.style.display==='none')continue;
      var r=c.el.getBoundingClientRect();
      if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
        dragIdx=i;dragOx=e.clientX-parseInt(c.el.style.left);dragOy=e.clientY-parseInt(c.el.style.top);e.preventDefault();break;
      }
    }
  }
});

document.addEventListener('mousemove',function(e){
  if(phase!=='play')return;
  if(rotIdx>=0){
    var c=cardData[rotIdx];
    var angle=Math.atan2(e.clientY,e.clientX)*180/Math.PI;
    c.rotation=rotStartRot+(angle-rotStartAngle);
    c.el.style.transform='rotate('+c.rotation+'deg) scale('+c.scale+')';
    checkWin(rotIdx);
  }else if(dragIdx>=0){
    var c=cardData[dragIdx];
    c.el.style.left=(e.clientX-dragOx)+'px';
    c.el.style.top=(e.clientY-dragOy)+'px';
  }
});

document.addEventListener('mouseup',function(){dragIdx=-1;rotIdx=-1});
</script>
</body>
</html>
